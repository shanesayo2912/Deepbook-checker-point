<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sui VietNam Community - DeepBook Airdrop Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Orbitron:wght@400;700;900&display=swap");

      :root {
        --primary: #06b6d4;
        --bg-dark: #020617;
      }
      body {
        background: var(--bg-dark);
        color: #f8fafc;
        font-family: "Plus Jakarta Sans", sans-serif;
        overflow-x: hidden;
      }

      /* HIỆU ỨNG CHỚP SÁNG LOGO */
      @keyframes led-glow {
        0%,
        100% {
          box-shadow: 0 0 10px rgba(6, 182, 212, 0.2);
          filter: brightness(1);
        }
        50% {
          box-shadow: 0 0 30px rgba(6, 182, 212, 0.6);
          filter: brightness(1.2);
        }
      }
      .led-logo {
        animation: led-glow 2.5s infinite ease-in-out;
        border: none !important;
      }

      .community-font {
        font-family: "Orbitron", sans-serif;
        letter-spacing: 1px;
        text-shadow: 0 0 8px rgba(34, 211, 238, 0.6);
      }

      .bg-glow {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(
            circle at 15% 25%,
            rgba(6, 182, 212, 0.12) 0%,
            transparent 45%
          ),
          radial-gradient(
            circle at 85% 75%,
            rgba(59, 130, 246, 0.12) 0%,
            transparent 45%
          );
        z-index: -1;
        filter: blur(60px);
      }
      .bg-grid {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: linear-gradient(
            rgba(255, 255, 255, 0.02) 1px,
            transparent 1px
          ),
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: -2;
      }
      .glass {
        background: rgba(15, 23, 42, 0.7);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .btn-select {
        background: #0f172a;
        border: 1px solid #1e293b;
        transition: all 0.2s;
        color: #64748b;
      }
      .btn-select.active {
        background: #06b6d4;
        border-color: #22d3ee;
        color: #020617;
        font-weight: 800;
        box-shadow: 0 0 15px rgba(34, 211, 238, 0.4);
      }
      .btn-gradient {
        background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="p-4 md:p-8">
    <div class="bg-glow"></div>
    <div class="bg-grid"></div>

    <div class="max-w-5xl mx-auto">
      <!-- Header -->
      <div
        class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6 pb-6 border-b border-white/5"
      >
        <div class="flex items-center gap-5">
          <img
            src="https://pbs.twimg.com/media/GtPpn5JWwAANuk6.jpg"
            class="w-16 h-16 rounded-2xl shadow-2xl led-logo"
          />
          <div>
            <h1
              class="text-4xl font-extrabold tracking-tighter italic leading-none text-white uppercase"
            >
              Deep<span class="text-cyan-400">Book</span>
            </h1>
            <p
              class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.4em] mt-2 italic"
            >
              Airdrop Calculator
            </p>
          </div>
        </div>
        <div
          class="flex items-center gap-4 bg-slate-900/50 px-6 py-3 rounded-2xl border border-white/10 shadow-lg"
        >
          <p
            class="text-sm font-black text-cyan-300 tracking-tight italic hidden md:block community-font"
          >
            Sui VietNam Community
          </p>
          <img
            src="https://i.postimg.cc/RFgdS32B/Logo-(1).png"
            class="w-12 h-12 rounded-full p-0.5 bg-[#020617] object-cover led-logo"
          />
        </div>
      </div>

      <div class="space-y-6">
        <!-- Main Settings -->
        <div
          class="glass p-6 rounded-3xl grid grid-cols-1 md:grid-cols-2 gap-8"
        >
          <div>
            <label
              class="block text-[11px] font-bold text-cyan-500 mb-4 uppercase italic tracking-widest"
              >1. Tổng cung Point dự kiến</label
            >
            <div class="grid grid-cols-2 gap-2">
              <button
                onclick="setSupply(12000000, this)"
                class="btn-select py-3 rounded-xl text-xs active"
              >
                12 Triệu
              </button>
              <button
                onclick="setSupply(13000000, this)"
                class="btn-select py-3 rounded-xl text-xs"
              >
                13 Triệu
              </button>
              <button
                onclick="setSupply(14000000, this)"
                class="btn-select py-3 rounded-xl text-xs"
              >
                14 Triệu
              </button>
              <button
                onclick="setSupply(15000000, this)"
                class="btn-select py-3 rounded-xl text-xs"
              >
                15 Triệu
              </button>
            </div>
          </div>
          <div>
            <div class="flex justify-between items-center mb-4">
              <label
                class="text-[11px] font-bold text-cyan-500 uppercase italic tracking-widest"
                >2. Tỷ lệ Airdrop (%)</label
              >
              <span
                id="pct-label"
                class="text-xs font-black text-white bg-cyan-950 px-3 py-1 rounded-lg border border-cyan-500/30"
                >1%</span
              >
            </div>
            <input
              type="range"
              id="airdrop-slider"
              min="0.1"
              max="5"
              step="0.1"
              value="1"
              oninput="calculate()"
              class="w-full h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-cyan-400"
            />
          </div>
        </div>

        <!-- Quick Calculator -->
        <div
          class="glass p-8 rounded-3xl border-l-4 border-l-cyan-500 shadow-xl"
        >
          <div class="flex items-center gap-3 mb-6">
            <i class="fa-solid fa-calculator text-cyan-400"></i>
            <h2
              class="text-xs font-black uppercase tracking-widest italic text-white"
            >
              TÍNH NHANH (QUICK LAB)
            </h2>
          </div>
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-end">
            <div>
              <label
                class="block text-[9px] font-bold text-slate-500 mb-2 uppercase italic tracking-widest"
                >Nhập số Point</label
              >
              <input
                type="number"
                id="quick-input"
                oninput="quickCalc()"
                class="w-full bg-slate-950 border border-white/5 rounded-xl p-4 text-white font-black text-xl outline-none focus:border-cyan-500/30 transition-all"
                placeholder="100"
              />
            </div>
            <div class="lg:col-span-2 grid grid-cols-2 gap-4">
              <div
                class="bg-white/5 p-5 rounded-2xl border border-white/5 text-center"
              >
                <p
                  class="text-[9px] font-bold text-slate-500 uppercase mb-1 italic"
                >
                  Sẽ nhận ($DEEP)
                </p>
                <p
                  id="quick-token"
                  class="text-2xl font-black text-white italic"
                >
                  0
                </p>
              </div>
              <div
                class="bg-white/5 p-5 rounded-2xl border border-white/5 text-center"
              >
                <p
                  class="text-[9px] font-bold text-slate-500 uppercase mb-1 italic"
                >
                  Giá trị ước tính ($)
                </p>
                <p
                  id="quick-usd"
                  class="text-2xl font-black text-green-400 italic"
                >
                  $0
                </p>
              </div>
            </div>
          </div>
        </div>

        <!-- Wallet Input -->
        <div class="glass p-6 rounded-3xl">
          <label
            class="block text-[11px] font-bold text-cyan-500 mb-3 uppercase italic tracking-widest"
            >3. Kiểm tra danh sách ví hàng loạt</label
          >
          <textarea
            id="input-data"
            rows="5"
            class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 font-mono text-sm text-cyan-100 outline-none focus:border-cyan-500/50 transition-all custom-scrollbar"
            placeholder="Nhập ví 0x... mỗi dòng một ví"
          ></textarea>
          <button
            onclick="handleCheck()"
            id="btn-check"
            class="w-full btn-gradient mt-4 py-4 rounded-xl font-black uppercase tracking-[0.2em] text-white shadow-lg active:scale-95 transition-all"
          >
            <i class="fa-solid fa-bolt mr-2"></i> Check now
          </button>
        </div>

        <!-- Summary -->
        <div
          id="summary-section"
          class="hidden grid grid-cols-1 md:grid-cols-3 gap-4"
        >
          <div
            class="glass p-6 rounded-2xl text-center border-b-2 border-b-slate-500"
          >
            <p
              class="text-[9px] font-bold text-slate-500 uppercase mb-1 tracking-widest"
            >
              Tổng Point
            </p>
            <p id="total-points" class="text-2xl font-black text-white italic">
              0
            </p>
          </div>
          <div
            class="glass p-6 rounded-2xl text-center border-b-2 border-b-cyan-500"
          >
            <p
              class="text-[9px] font-bold text-cyan-500 uppercase mb-1 tracking-widest"
            >
              Tổng $DEEP
            </p>
            <p id="total-tokens" class="text-2xl font-black text-white italic">
              0
            </p>
          </div>
          <div
            class="glass p-6 rounded-2xl text-center border-b-2 border-b-green-500"
          >
            <p
              class="text-[9px] font-bold text-green-500 uppercase mb-1 tracking-widest"
            >
              Tổng Giá Trị $
            </p>
            <p id="total-usd" class="text-2xl font-black text-white italic">
              $0
            </p>
          </div>
        </div>

        <!-- Results Table -->
        <div class="glass rounded-3xl overflow-hidden border border-white/5">
          <div
            class="p-6 border-b border-white/5 flex flex-col md:flex-row justify-between items-center bg-white/5 gap-6"
          >
            <h3
              class="text-xs font-black uppercase tracking-widest text-white italic"
            >
              Chi tiết phân bổ dự kiến
            </h3>

            <!-- Ô GIÁ ĐÃ ĐƯỢC LÀM TO RA -->
            <div
              class="flex items-center gap-6 bg-black/60 px-5 py-3 rounded-2xl border border-white/10 shadow-2xl"
            >
              <div class="flex items-center gap-3">
                <span
                  class="text-[11px] text-slate-400 font-bold uppercase italic tracking-wider"
                  >Giá Live:</span
                >
                <span
                  id="live-price-label"
                  class="text-lg font-black text-cyan-400 font-mono tracking-tighter leading-none"
                  >$...</span
                >
              </div>
              <div class="h-6 w-[1px] bg-white/20"></div>
              <div class="flex items-center gap-3">
                <span
                  class="text-[11px] text-green-500 font-bold uppercase italic tracking-wider"
                  >Chỉnh giá:</span
                >
                <input
                  type="number"
                  id="custom-price"
                  oninput="updateAll()"
                  step="0.001"
                  placeholder="0.000"
                  class="w-24 bg-slate-900 border border-white/10 rounded-xl px-3 py-2 text-sm font-black text-green-400 outline-none focus:border-green-500/50 transition-all"
                />
              </div>
            </div>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left">
              <thead
                class="bg-slate-900/50 text-[10px] text-slate-500 uppercase font-black"
              >
                <tr>
                  <th class="p-5">Hạng</th>
                  <th class="p-5">Địa chỉ ví</th>
                  <th class="p-5 text-right text-slate-300">Point</th>
                  <th class="p-5 text-right text-cyan-400">Tokens</th>
                  <th class="p-5 text-right text-green-400">Giá trị ($)</th>
                </tr>
              </thead>
              <tbody
                id="result-table"
                class="divide-y divide-white/5 font-mono text-[11px]"
              >
                <tr>
                  <td
                    colspan="5"
                    class="p-10 text-center text-slate-700 italic"
                  >
                    Dán ví để bắt đầu kiểm tra...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      let livePrice = 0.032;
      let selectedSupply = 12000000;
      let lastData = [];
      const TOTAL_DEEP = 10000000000;
      const DEEP_ADDRESS =
        "0xdeeb7a4662eec9f2f3def03fb937a663dddaa2e215b8078a284d026b7946c270::deep::DEEP";

      function getActivePrice() {
        const customPrice = document.getElementById("custom-price").value;
        return customPrice ? parseFloat(customPrice) : livePrice;
      }

      async function fetchPrice() {
        try {
          const res = await fetch("https://api-sui.cetus.zone/v3/token/list");
          const json = await res.json();
          if (json.code === 200 && json.data && json.data.tokens) {
            const deepToken = json.data.tokens.find(
              (t) => t.address === DEEP_ADDRESS
            );
            if (deepToken && deepToken.price) {
              livePrice = parseFloat(deepToken.price);
              const label = document.getElementById("live-price-label");
              label.innerText = "$" + livePrice.toFixed(4);
              updateAll();
            }
          }
        } catch (e) {
          console.error("Lỗi lấy giá:", e);
        }
      }

      function setSupply(val, btn) {
        selectedSupply = val;
        document
          .querySelectorAll(".btn-select")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        updateAll();
      }

      function calculate() {
        document.getElementById("pct-label").innerText =
          document.getElementById("airdrop-slider").value + "%";
        updateAll();
      }

      function quickCalc() {
        const points =
          parseFloat(document.getElementById("quick-input").value) || 0;
        const pct = parseFloat(document.getElementById("airdrop-slider").value);
        const rate = (TOTAL_DEEP * (pct / 100)) / selectedSupply;
        const tokens = points * rate;
        const usd = tokens * getActivePrice();
        document.getElementById("quick-token").innerText =
          Math.round(tokens).toLocaleString();
        document.getElementById("quick-usd").innerText =
          "$" +
          usd.toLocaleString(undefined, {
            minimumFractionDigits: 1,
            maximumFractionDigits: 2,
          });
      }

      function updateAll() {
        quickCalc();
        if (lastData.length > 0) renderResults(lastData);
      }

      const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      async function handleCheck() {
        const input = document.getElementById("input-data").value.trim();
        const lines = input.split(/[\n,;\s]+/).filter((l) => l.trim() !== "");
        const btn = document.getElementById("btn-check");
        if (lines.length === 0) return;
        btn.disabled = true;
        btn.innerHTML =
          '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Đang đồng bộ...';
        let dataList = [];
        for (let item of lines) {
          if (item.startsWith("0x")) {
            await sleep(300);
            try {
              const res = await fetch(
                `https://api-sui.cetus.zone/v3/sui/deepbookv3/points/self_rank?address=${item}`
              );
              const json = await res.json();
              if (json.data) {
                dataList.push({
                  rank: json.data.rank,
                  points: json.data.points,
                  id: item,
                });
              } else {
                dataList.push({ rank: "N/A", points: 0, id: item });
              }
            } catch (e) {
              dataList.push({ rank: "Err", points: 0, id: item });
            }
          } else if (!isNaN(item)) {
            dataList.push({
              rank: "-",
              points: parseInt(item),
              id: "Manual Entry",
            });
          }
        }
        lastData = dataList;
        document.getElementById("summary-section").classList.remove("hidden");
        renderResults(dataList);
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-bolt mr-2"></i> Check now';
      }

      function renderResults(data) {
        const pct = parseFloat(document.getElementById("airdrop-slider").value);
        const rate = (TOTAL_DEEP * (pct / 100)) / selectedSupply;
        const tbody = document.getElementById("result-table");
        const currentActivePrice = getActivePrice();
        let sumPoints = 0,
          sumTokens = 0,
          sumUsd = 0;
        tbody.innerHTML = data
          .map((item) => {
            const tokens = item.points * rate;
            const usdValue = tokens * currentActivePrice;
            sumPoints += item.points;
            sumTokens += tokens;
            sumUsd += usdValue;
            const displayId = item.id.startsWith("0x")
              ? item.id.substring(0, 8) +
                "..." +
                item.id.substring(item.id.length - 4)
              : item.id;
            return `
            <tr class="hover:bg-cyan-500/5 transition-colors group">
                <td class="p-5 font-bold text-slate-500 italic">#${
                  item.rank
                }</td>
                <td class="p-5 text-slate-400 font-bold group-hover:text-cyan-400 transition-colors uppercase tracking-tighter">${displayId}</td>
                <td class="p-5 font-black text-slate-300 text-right">${item.points.toLocaleString()}</td>
                <td class="p-5 font-black text-cyan-400 text-sm italic text-right">${Math.round(
                  tokens
                ).toLocaleString()}</td>
                <td class="p-5 font-black text-green-400 text-sm italic text-right">$${usdValue.toLocaleString(
                  undefined,
                  { minimumFractionDigits: 1, maximumFractionDigits: 2 }
                )}</td>
            </tr>`;
          })
          .join("");
        document.getElementById("total-points").innerText =
          sumPoints.toLocaleString();
        document.getElementById("total-tokens").innerText =
          Math.round(sumTokens).toLocaleString();
        document.getElementById("total-usd").innerText =
          "$" +
          sumUsd.toLocaleString(undefined, {
            minimumFractionDigits: 1,
            maximumFractionDigits: 2,
          });
      }

      // Lấy giá ngay lập tức khi load xong trang
      window.onload = fetchPrice;
      setInterval(fetchPrice, 5000);
    </script>
  </body>
</html>
